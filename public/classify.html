<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Classifier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 1rem;
            font-size: 2rem;
        }

        .progress {
            text-align: center;
            margin-bottom: 2rem;
            color: rgba(255,255,255,0.7);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00c853, #1de9b6);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .meme-card {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
        }

        .meme-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            margin-bottom: 1.5rem;
        }

        .meme-url {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            word-break: break-all;
            margin-bottom: 1.5rem;
        }

        .current-category {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 1rem;
        }

        .current-category span {
            background: rgba(255,255,255,0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            margin-left: 0.5rem;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-too-early { background: linear-gradient(135deg, #7b1fa2, #9c27b0); color: white; }
        .btn-no { background: linear-gradient(135deg, #ff1744, #ff6d00); color: white; }
        .btn-yes { background: linear-gradient(135deg, #00c853, #1de9b6); color: white; }
        .btn-in-progress { background: linear-gradient(135deg, #1565c0, #42a5f5); color: white; }
        .btn-results { background: linear-gradient(135deg, #f57c00, #ffb74d); color: white; }
        .btn-reject { background: linear-gradient(135deg, #424242, #616161); color: white; }

        .nav-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .nav-btn {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            cursor: pointer;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .export-section {
            margin-top: 2rem;
            text-align: center;
        }

        .export-btn {
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            background: white;
            color: #333;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 0.5rem;
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .output {
            margin-top: 2rem;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 1rem;
            text-align: left;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
            display: none;
        }

        .complete {
            text-align: center;
            padding: 3rem;
        }

        .complete h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0;
        }

        .stat {
            background: rgba(255,255,255,0.1);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            text-align: center;
        }

        .stat-count {
            font-size: 2rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
        }

        .keyboard-hint {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
        }

        .keyboard-hint kbd {
            background: rgba(255,255,255,0.2);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            margin: 0 0.25rem;
        }

        .add-meme-section {
            margin-top: 2rem;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .add-meme-section h3 {
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .add-meme-form {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .add-meme-input {
            flex: 1;
            min-width: 250px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
            color: white;
        }

        .add-meme-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .add-meme-input:focus {
            outline: none;
            border-color: rgba(255,255,255,0.6);
        }

        .add-meme-btn {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #00c853, #1de9b6);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .add-meme-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .add-meme-message {
            width: 100%;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
        }

        .add-meme-message.error {
            color: #ff6b6b;
        }

        .add-meme-message.success {
            color: #69db7c;
        }

        .delete-btn {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            background: rgba(255,0,0,0.3);
            color: white;
            border: 1px solid rgba(255,0,0,0.5);
            border-radius: 6px;
            cursor: pointer;
            margin-left: 0.5rem;
        }

        .delete-btn:hover {
            background: rgba(255,0,0,0.5);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: rgba(255,255,255,0.7);
        }

        .empty-state h3 {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Meme Classifier</h1>
        <div class="progress">
            <span id="progress-text">0 / 0</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
        </div>

        <div class="meme-card" id="meme-card">
            <img class="meme-image" id="meme-image" src="" alt="Meme">
            <div class="meme-url" id="meme-url"></div>
            <div class="current-category" id="current-category"></div>

            <div class="buttons">
                <button class="btn btn-too-early" onclick="classify('TOO_EARLY')">TOO_EARLY</button>
                <button class="btn btn-no" onclick="classify('NO')">NO</button>
                <button class="btn btn-yes" onclick="classify('YES')">YES</button>
                <button class="btn btn-in-progress" onclick="classify('IN_PROGRESS')">IN_PROGRESS</button>
                <button class="btn btn-results" onclick="classify('RESULTS')">RESULTS</button>
                <button class="btn btn-reject" onclick="classify('REJECT')">REJECT</button>
            </div>

            <div class="keyboard-hint">
                <kbd>1</kbd> TOO_EARLY <kbd>2</kbd> NO <kbd>3</kbd> YES <kbd>4</kbd> IN_PROGRESS <kbd>5</kbd> RESULTS <kbd>0</kbd> REJECT
                <br><kbd>←</kbd> Previous <kbd>→</kbd> Next <kbd>S</kbd> Skip to unclassified <kbd>F</kbd> Fetch more
            </div>

            <div class="nav-buttons">
                <button class="nav-btn" id="prev-btn" onclick="prev()">← Previous</button>
                <button class="nav-btn" id="next-btn" onclick="next()">Next →</button>
                <button class="nav-btn" onclick="skipToUnclassified()">Skip to Unclassified</button>
                <button class="delete-btn" id="delete-btn" onclick="deleteCurrent()">Delete</button>
            </div>
        </div>

        <div class="empty-state" id="empty-state" style="display: none;">
            <h3>No memes to classify</h3>
            <p>Add some meme URLs below to get started!</p>
        </div>

        <div class="complete" id="complete" style="display: none;">
            <h2>Classification Complete!</h2>
            <div class="stats" id="stats"></div>
        </div>

        <div class="add-meme-section">
            <h3>Add New Memes</h3>
            <div class="add-meme-form">
                <button class="add-meme-btn" onclick="fetchRandomMemes()" id="fetch-btn">Fetch Random Memes from Imgflip</button>
                <button class="add-meme-btn" onclick="fetchRandomMemes(20)" style="background: linear-gradient(135deg, #1565c0, #42a5f5);">Fetch 20 More</button>
            </div>
            <div class="add-meme-message" id="add-meme-message"></div>
            <div class="add-meme-form" style="margin-top: 1rem;">
                <input type="text" class="add-meme-input" id="new-meme-url" placeholder="Or paste a meme URL manually...">
                <button class="add-meme-btn" onclick="addMeme()" style="background: linear-gradient(135deg, #7b1fa2, #9c27b0);">Add URL</button>
            </div>
        </div>

        <div class="export-section">
            <button class="export-btn" onclick="exportResults()">Export Results</button>
            <button class="export-btn" onclick="copyToClipboard()">Copy to Clipboard</button>
            <button class="export-btn" onclick="clearAll()" style="background: #ff6b6b;">Clear All</button>
        </div>

        <pre class="output" id="output"></pre>
    </div>

    <script>
        // Default memes from original app.js
        const DEFAULT_MEMES = [
            'https://i.imgflip.com/1bhk.jpg',
            'https://i.imgflip.com/9ehk.jpg',
            'https://i.kym-cdn.com/entries/icons/original/000/006/077/so_telegenetic.jpg',
            'https://i.imgflip.com/1bik.jpg',
            'https://i.imgflip.com/1ur9b0.jpg',
            'https://i.imgflip.com/wxica.jpg',
            'https://i.imgflip.com/2pw3.jpg',
            'https://i.imgflip.com/9vct.jpg',
            'https://i.kym-cdn.com/entries/icons/original/000/003/619/ForeverAlone.jpg',
            'https://i.imgflip.com/26jxvz.jpg',
            'https://i.imgflip.com/1otk96.jpg',
            'https://i.imgflip.com/3umnka.jpg',
            'https://i.imgflip.com/4acd7j.png',
            'https://i.kym-cdn.com/entries/icons/facebook/000/005/288/tn_1235245586270.jpg',
            'https://i.imgflip.com/1w7ygt.jpg',
            'https://i.imgflip.com/2wifvo.jpg',
            'https://i.imgflip.com/1c1uej.jpg',
            'https://i.imgflip.com/4t0m5.jpg',
            'https://i.imgflip.com/1bij.jpg',
            'https://i.imgflip.com/30b1gx.jpg',
            'https://i.imgflip.com/2odset.jpg',
        ];

        // Original categories for reference
        const ORIGINAL_CATEGORIES = {
            'https://i.imgflip.com/1bhk.jpg': ['YES', 'IN_PROGRESS'],
            'https://i.imgflip.com/9ehk.jpg': ['YES', 'RESULTS'],
            'https://i.kym-cdn.com/entries/icons/original/000/006/077/so_telegenetic.jpg': ['YES'],
            'https://i.imgflip.com/1bik.jpg': ['YES'],
            'https://i.imgflip.com/1ur9b0.jpg': ['YES', 'TOO_EARLY', 'RESULTS'],
            'https://i.imgflip.com/wxica.jpg': ['YES', 'IN_PROGRESS'],
            'https://i.imgflip.com/2pw3.jpg': ['NO', 'IN_PROGRESS'],
            'https://i.imgflip.com/9vct.jpg': ['NO'],
            'https://i.kym-cdn.com/entries/icons/original/000/003/619/ForeverAlone.jpg': ['NO'],
            'https://i.imgflip.com/26jxvz.jpg': ['NO'],
            'https://i.imgflip.com/1otk96.jpg': ['NO', 'TOO_EARLY'],
            'https://i.imgflip.com/3umnka.jpg': ['NO', 'IN_PROGRESS'],
            'https://i.imgflip.com/4acd7j.png': ['TOO_EARLY', 'RESULTS'],
            'https://i.kym-cdn.com/entries/icons/facebook/000/005/288/tn_1235245586270.jpg': ['TOO_EARLY'],
            'https://i.imgflip.com/1w7ygt.jpg': ['TOO_EARLY'],
            'https://i.imgflip.com/2wifvo.jpg': ['TOO_EARLY'],
            'https://i.imgflip.com/1c1uej.jpg': ['IN_PROGRESS'],
            'https://i.imgflip.com/4t0m5.jpg': ['IN_PROGRESS'],
            'https://i.imgflip.com/1bij.jpg': ['RESULTS'],
            'https://i.imgflip.com/30b1gx.jpg': ['RESULTS'],
            'https://i.imgflip.com/2odset.jpg': ['RESULTS'],
        };

        // Load saved meme list or use defaults
        let MEMES = JSON.parse(localStorage.getItem('memeList') || 'null') || [...new Set(DEFAULT_MEMES)];

        // Load saved classifications or initialize empty
        let classifications = JSON.parse(localStorage.getItem('memeClassifications') || '{}');
        let currentIndex = 0;

        function saveMemeList() {
            localStorage.setItem('memeList', JSON.stringify(MEMES));
        }

        function updateDisplay() {
            // Handle empty state
            if (MEMES.length === 0) {
                document.getElementById('meme-card').style.display = 'none';
                document.getElementById('empty-state').style.display = 'block';
                document.getElementById('complete').style.display = 'none';
                document.getElementById('progress-text').textContent = '0 memes in list';
                document.getElementById('progress-fill').style.width = '0%';
                return;
            }

            document.getElementById('meme-card').style.display = 'block';
            document.getElementById('empty-state').style.display = 'none';

            // Ensure currentIndex is valid
            if (currentIndex >= MEMES.length) {
                currentIndex = MEMES.length - 1;
            }
            if (currentIndex < 0) {
                currentIndex = 0;
            }

            const url = MEMES[currentIndex];
            document.getElementById('meme-image').src = url;
            document.getElementById('meme-url').textContent = url;

            // Show current classification if any
            const current = classifications[url];
            const originalCats = ORIGINAL_CATEGORIES[url] || [];
            let categoryHtml = originalCats.length > 0
                ? `Originally in: <span>${originalCats.join(', ')}</span>`
                : `<span>New meme</span>`;
            if (current) {
                categoryHtml += ` → Classified as: <span>${current}</span>`;
            }
            document.getElementById('current-category').innerHTML = categoryHtml;

            // Update progress - count only classifications for memes still in the list
            const classified = MEMES.filter(url => classifications[url]).length;
            document.getElementById('progress-text').textContent = `${classified} / ${MEMES.length} classified (viewing ${currentIndex + 1} of ${MEMES.length})`;
            document.getElementById('progress-fill').style.width = `${(classified / MEMES.length) * 100}%`;

            // Update nav buttons
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-btn').disabled = currentIndex === MEMES.length - 1;

            // Check if complete
            if (classified === MEMES.length && MEMES.length > 0) {
                showComplete();
            } else {
                document.getElementById('complete').style.display = 'none';
            }
        }

        function classify(category) {
            const url = MEMES[currentIndex];
            classifications[url] = category;
            localStorage.setItem('memeClassifications', JSON.stringify(classifications));

            // Auto-advance to next unclassified or next in sequence
            if (currentIndex < MEMES.length - 1) {
                currentIndex++;
            }
            updateDisplay();
        }

        function prev() {
            if (currentIndex > 0) {
                currentIndex--;
                updateDisplay();
            }
        }

        function next() {
            if (currentIndex < MEMES.length - 1) {
                currentIndex++;
                updateDisplay();
            }
        }

        function skipToUnclassified() {
            // Find next unclassified meme starting from current position
            for (let i = currentIndex + 1; i < MEMES.length; i++) {
                if (!classifications[MEMES[i]]) {
                    currentIndex = i;
                    updateDisplay();
                    return;
                }
            }
            // Wrap around to beginning
            for (let i = 0; i < currentIndex; i++) {
                if (!classifications[MEMES[i]]) {
                    currentIndex = i;
                    updateDisplay();
                    return;
                }
            }
            // All classified
            const message = document.getElementById('add-meme-message');
            message.textContent = 'All memes are classified! Fetch more to continue.';
            message.className = 'add-meme-message success';
        }

        function showComplete() {
            // Still show the meme card for editing
            const stats = {};
            for (const cat of Object.values(classifications)) {
                stats[cat] = (stats[cat] || 0) + 1;
            }

            let statsHtml = '';
            for (const [cat, count] of Object.entries(stats).sort((a, b) => b[1] - a[1])) {
                statsHtml += `<div class="stat"><div class="stat-count">${count}</div><div class="stat-label">${cat}</div></div>`;
            }
            document.getElementById('stats').innerHTML = statsHtml;
            document.getElementById('complete').style.display = 'block';
        }

        function exportResults() {
            const output = document.getElementById('output');

            // Group by category
            const grouped = {
                TOO_EARLY: [],
                NO: [],
                YES: [],
                IN_PROGRESS: [],
                RESULTS: [],
                REJECT: []
            };

            for (const [url, cat] of Object.entries(classifications)) {
                if (grouped[cat]) {
                    grouped[cat].push(url);
                }
            }

            // Generate JavaScript code
            let code = '// Generated meme classifications\n\n';

            for (const [cat, urls] of Object.entries(grouped)) {
                if (cat === 'REJECT') continue;
                if (urls.length === 0) continue;

                code += `const ${cat}_IMAGES = [\n`;
                for (const url of urls) {
                    code += `    '${url}',\n`;
                }
                code += '];\n\n';
            }

            if (grouped.REJECT.length > 0) {
                code += '// Rejected memes:\n';
                for (const url of grouped.REJECT) {
                    code += `// ${url}\n`;
                }
            }

            output.textContent = code;
            output.style.display = 'block';
        }

        function copyToClipboard() {
            exportResults();
            const output = document.getElementById('output');
            navigator.clipboard.writeText(output.textContent).then(() => {
                alert('Copied to clipboard!');
            });
        }

        function addMeme() {
            const input = document.getElementById('new-meme-url');
            const message = document.getElementById('add-meme-message');
            const url = input.value.trim();

            if (!url) {
                message.textContent = 'Please enter a URL';
                message.className = 'add-meme-message error';
                return;
            }

            // Basic URL validation
            if (!url.match(/^https?:\/\/.+/i)) {
                message.textContent = 'Please enter a valid URL starting with http:// or https://';
                message.className = 'add-meme-message error';
                return;
            }

            // Check for duplicates
            if (MEMES.includes(url)) {
                message.textContent = 'This meme is already in the list';
                message.className = 'add-meme-message error';
                // Jump to the existing meme
                currentIndex = MEMES.indexOf(url);
                updateDisplay();
                return;
            }

            // Add the meme
            MEMES.push(url);
            saveMemeList();

            // Jump to the new meme
            currentIndex = MEMES.length - 1;
            updateDisplay();

            // Clear input and show success
            input.value = '';
            message.textContent = 'Meme added! Classify it now.';
            message.className = 'add-meme-message success';

            // Clear message after 3 seconds
            setTimeout(() => {
                message.textContent = '';
            }, 3000);
        }

        function deleteCurrent() {
            if (MEMES.length === 0) return;

            const url = MEMES[currentIndex];
            if (!confirm(`Delete this meme from the list?\n\n${url}`)) {
                return;
            }

            // Remove from meme list
            MEMES.splice(currentIndex, 1);
            saveMemeList();

            // Remove classification if exists
            if (classifications[url]) {
                delete classifications[url];
                localStorage.setItem('memeClassifications', JSON.stringify(classifications));
            }

            updateDisplay();
        }

        function clearAll() {
            if (!confirm('Clear ALL memes and classifications? This cannot be undone.')) {
                return;
            }

            MEMES = [];
            classifications = {};
            currentIndex = 0;
            saveMemeList();
            localStorage.setItem('memeClassifications', JSON.stringify(classifications));
            document.getElementById('output').style.display = 'none';
            updateDisplay();
        }

        async function fetchRandomMemes(count = 100) {
            const message = document.getElementById('add-meme-message');
            const fetchBtn = document.getElementById('fetch-btn');

            message.textContent = 'Fetching memes from Imgflip...';
            message.className = 'add-meme-message';
            fetchBtn.disabled = true;
            fetchBtn.textContent = 'Loading...';

            try {
                const response = await fetch('https://api.imgflip.com/get_memes');
                const data = await response.json();

                if (!data.success) {
                    throw new Error('Imgflip API error');
                }

                // Shuffle and take requested count
                const shuffled = data.data.memes.sort(() => Math.random() - 0.5);
                const selected = shuffled.slice(0, count);

                let added = 0;
                for (const meme of selected) {
                    if (!MEMES.includes(meme.url)) {
                        MEMES.push(meme.url);
                        added++;
                    }
                }

                saveMemeList();

                // Jump to first new meme if any were added
                if (added > 0) {
                    currentIndex = MEMES.length - added;
                    message.textContent = `Added ${added} new memes! ${count - added} were duplicates.`;
                    message.className = 'add-meme-message success';
                } else {
                    message.textContent = 'All memes were already in your list. Try again for different ones!';
                    message.className = 'add-meme-message';
                }

                updateDisplay();
            } catch (error) {
                console.error('Error fetching memes:', error);
                message.textContent = 'Failed to fetch memes. Check your connection and try again.';
                message.className = 'add-meme-message error';
            } finally {
                fetchBtn.disabled = false;
                fetchBtn.textContent = 'Fetch Random Memes from Imgflip';
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Don't trigger shortcuts when typing in input
            if (e.target.tagName === 'INPUT') {
                if (e.key === 'Enter') {
                    addMeme();
                }
                return;
            }

            switch (e.key) {
                case '1': classify('TOO_EARLY'); break;
                case '2': classify('NO'); break;
                case '3': classify('YES'); break;
                case '4': classify('IN_PROGRESS'); break;
                case '5': classify('RESULTS'); break;
                case '0': classify('REJECT'); break;
                case 'ArrowLeft': prev(); break;
                case 'ArrowRight': next(); break;
                case 'f':
                case 'F':
                    fetchRandomMemes(20);
                    break;
                case 's':
                case 'S':
                    skipToUnclassified();
                    break;
                case 'Delete':
                case 'Backspace':
                    if (e.ctrlKey || e.metaKey) {
                        deleteCurrent();
                    }
                    break;
            }
        });

        // Initialize
        updateDisplay();
    </script>
</body>
</html>
