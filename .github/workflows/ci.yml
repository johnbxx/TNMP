name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install worker dependencies
        run: npm ci
        working-directory: worker

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm test

      - name: Run worker tests
        run: npm test
        working-directory: worker

      - name: Copy engine files
        run: npm run build:engine

      - name: Build frontend
        run: npx vite build

      - name: Build embed
        run: |
          node scripts/build-embed-pieces.js
          npx vite build --config vite.config.embed.js

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install worker dependencies
        run: npm ci
        working-directory: worker

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply tnmp-games --remote
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker
        run: npx wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build and deploy frontend
        run: |
          npm run build:engine
          npx vite build
          node scripts/build-embed-pieces.js
          npx vite build --config vite.config.embed.js
          mkdir -p dist/embed
          cp dist-embed/tnmp-viewer.js dist/embed/
          npx wrangler pages deploy dist --project-name=tnmpairings
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
