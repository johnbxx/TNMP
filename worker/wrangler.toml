name = "tnmp-notifications"
main = "src/index.js"
compatibility_date = "2024-01-01"
workers_dev = false

[triggers]
# Pairings: every minute Mon 7PM-midnight Pacific → Tue in UTC
# Results: every 5 min Tue 6PM-midnight Pacific → Wed in UTC
# Cache refresh: every 20 min 24/7
# Windows cover both PST (UTC-8) and PDT (UTC-7) — starts 1h early in PST, harmless.
crons = ["* 2-8 * * TUE", "*/5 2-8 * * WED", "*/20 * * * *"]

[vars]
ALLOWED_ORIGIN = "https://tnmpairings.com"

[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "69d27221bb904515958233a6c9481e75"
preview_id = "6a5e8e3af1fb4230b857306fa8919325"

[[kv_namespaces]]
binding = "GAMES"
id = "dd3adec3b60b4002b71eaa1d1bae129e"
preview_id = "a33c31fc38e84569b0a9a83da55ad6f7"

[[routes]]
pattern = "api.tnmpairings.com"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "tnmp-games"
database_id = "571ae443-e8d3-4ffa-819b-51cbd9471d47"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "TOURNAMENT_CRON"
class_name = "TournamentCron"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TournamentCron"]
