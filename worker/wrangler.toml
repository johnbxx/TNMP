name = "tnmp-notifications"
main = "src/index.js"
compatibility_date = "2024-01-01"

[triggers]
# Pairings: every minute Mon 8PM-midnight Pacific → Tue in UTC
# Results: every 5 min Tue 7PM-midnight Pacific → Wed in UTC
# Cache refresh: hourly 24/7
# Windows cover both PST (UTC-8) and PDT (UTC-7) — handleScheduled() guards against early fires.
crons = ["* 3-8 * * TUE", "*/5 2-8 * * WED", "0 * * * *"]

[vars]
ALLOWED_ORIGIN = "https://tnmpairings.com"

[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "69d27221bb904515958233a6c9481e75"

[[kv_namespaces]]
binding = "GAMES"
id = "dd3adec3b60b4002b71eaa1d1bae129e"
